# CI for XML2RDF-converter.
# Replaces the old docker-image.yml: unit + e2e tests now gate every PR and
# every release, and the Docker image is built/pushed/registered on tag only
# AFTER the tests pass (the `docker` job `needs` test + e2e).
name: CI

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app.py dtd2xsl.py ontology_generator.py return_types.py tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xsltproc (used by the DTD->RDF conversion)
        run: sudo apt-get update && sudo apt-get install -y xsltproc
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Unit tests with coverage gate
        run: |
          pytest tests/unit \
            --cov=app --cov=dtd2xsl --cov=ontology_generator --cov=return_types \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=85 --junitxml=pytest-report.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xsltproc (used by the DTD->RDF conversion)
        run: sudo apt-get update && sudo apt-get install -y xsltproc
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: End-to-end app boot test
        run: pytest tests/e2e -m e2e -v

  docker:
    # Build/push the image only after tests pass.
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Save tag to file if release
        if: startsWith(github.ref, 'refs/tags/')
        run: echo ${{ github.ref_name }} > VERSION.txt && cat VERSION.txt
      - name: Build the Docker image (PR/branch — no push)
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: docker build . --file Dockerfile --tag tmp:notag
      - name: Build the Docker image for tag release
        if: startsWith(github.ref, 'refs/tags/')
        run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_IMAGE_NAME }}:latest
      - name: Docker Login
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Tag latest docker image
        if: startsWith(github.ref, 'refs/tags/')
        run: docker tag ${{ secrets.DOCKER_IMAGE_NAME }}:latest wseresearch/${{ secrets.DOCKER_IMAGE_NAME }}:latest
      - name: Tag docker image version
        if: startsWith(github.ref, 'refs/tags/')
        run: docker tag ${{ secrets.DOCKER_IMAGE_NAME }}:latest "wseresearch/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.ref_name }}"
      - name: Push latest docker image
        if: startsWith(github.ref, 'refs/tags/')
        run: docker push wseresearch/${{ secrets.DOCKER_IMAGE_NAME }}:latest
      - name: Replace docker volume mapping if existing
        if: startsWith(github.ref, 'refs/tags/')
        run: sed -i 's/VOLUME_SETTING/${{ secrets.VOLUMES }}/g' service_config/service_config.json
      - name: Push docker image version
        if: startsWith(github.ref, 'refs/tags/')
        run: docker push "wseresearch/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.ref_name }}"
      - name: Init update
        if: startsWith(github.ref, 'refs/tags/')
        uses: WSE-research/docker-service-updater@v0.2.1
        with:
          updater_host: ${{ secrets.UPDATER_HOST }}
          api_key: ${{ secrets.API_KEY }}
